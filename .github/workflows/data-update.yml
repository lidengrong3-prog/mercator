name: Mercator Data Update

on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run data collector
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_URL: ${{ secrets.AI_API_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/collect_data.py
      - id: git-check
        run: git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT
      - if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "Mercator Bot"
          git config user.email "mercator-bot@users.noreply.github.com"
          git add data/
          git commit -m "chore: auto-update policies, rules, platforms & countries data"
          git push
